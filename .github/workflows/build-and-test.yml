name: Node.js CI

on:
  push:
    branches: [main]

jobs:
  container-job:
    runs-on: ubuntu-latest
    container:
      image: node:16
      env:
        NODE_ENV: development
      ports:
        - 8080
      volumes:
        - my_docker_volume:/volume_mount
      options: --cpus 1
    steps:
      - name: Check Node.js version
        run: node --version